name: Release

# Trigger on version tags — push v* to create a new GitHub Release.
# Also supports manual dispatch for testing.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Create a draft GitHub Release so upload jobs can attach assets
  # ──────────────────────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.version.outputs.tag }}',
              name: 'PiPilot IDE ${{ steps.version.outputs.tag }}',
              body: 'See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.',
              draft: true,
              prerelease: false
            });
            return data.id;

  # ──────────────────────────────────────────────────────────────
  # Build & sign for every platform
  # ──────────────────────────────────────────────────────────────
  build-tauri:
    needs: create-release
    name: Build (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux (x86_64)
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            tauri-args: ''
          - name: macOS (x86_64)
            os: macos-13
            rust-target: x86_64-apple-darwin
            tauri-args: '--target x86_64-apple-darwin'
          - name: macOS (ARM64)
            os: macos-14
            rust-target: aarch64-apple-darwin
            tauri-args: '--target aarch64-apple-darwin'
          - name: Windows (x86_64)
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            tauri-args: ''

    runs-on: ${{ matrix.platform.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Node / pnpm ──────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # ── Rust ─────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # ── Linux system dependencies ────────────────────────────
      - name: Install Linux system deps
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── macOS code-signing setup ─────────────────────────────
      - name: Import Apple certificate
        if: startsWith(matrix.platform.os, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      # ── Windows code-signing setup ───────────────────────────
      - name: Decode Windows PFX
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
        run: |
          $bytes = [System.Convert]::FromBase64String($env:WINDOWS_PFX_BASE64)
          [System.IO.File]::WriteAllBytes("$env:RUNNER_TEMP\certificate.pfx", $bytes)

      # ── JS dependencies ──────────────────────────────────────
      - name: Install JS dependencies
        run: pnpm install

      # ── Tauri build & sign ───────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing keys (generated with `tauri signer generate`)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS notarisation
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Windows signing
          WINDOWS_PFX_PATH: ${{ matrix.platform.os == 'windows-latest' && format('{0}/certificate.pfx', runner.temp) || '' }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.platform.tauri-args }}

      # ── Cleanup Windows cert ─────────────────────────────────
      - name: Remove Windows PFX
        if: matrix.platform.os == 'windows-latest' && always()
        shell: pwsh
        run: Remove-Item -Force "$env:RUNNER_TEMP\certificate.pfx" -ErrorAction SilentlyContinue

  # ──────────────────────────────────────────────────────────────
  # Publish the release once all platforms have uploaded assets
  # ──────────────────────────────────────────────────────────────
  publish-release:
    needs: [create-release, build-tauri]
    name: Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            });
