<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary Meta -->
    <title>PiPilot IDE — AI-Powered Code Editor</title>
    <meta name="description" content="PiPilot IDE is a web-based AI-powered code editor with an integrated agent that builds, debugs, and deploys your projects. Real-time diagnostics, multi-tab Monaco editor, terminal, and visual preview — all in one workspace." />
    <meta name="keywords" content="IDE, code editor, AI coding, web IDE, online IDE, PiPilot, AI assistant, Monaco editor, developer tools, coding workspace" />
    <meta name="author" content="PiPilot" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0b0b0e" />
    <meta name="color-scheme" content="dark" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PiPilot IDE — AI-Powered Code Editor" />
    <meta property="og:description" content="Build faster with an AI agent that writes, debugs, and deploys your code. Multi-tab editor, real-time diagnostics, integrated terminal, and visual preview in one workspace." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:site_name" content="PiPilot IDE" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PiPilot IDE — AI-Powered Code Editor" />
    <meta name="twitter:description" content="Build faster with an AI agent that writes, debugs, and deploys your code. Multi-tab editor, real-time diagnostics, integrated terminal, and visual preview in one workspace." />
    <meta name="twitter:image" content="/logo.png" />

    <!-- Apple / PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PiPilot IDE" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Devicon — language/file-type icons for file tree -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "PiPilot IDE",
      "description": "AI-powered web-based code editor with an integrated agent that builds, debugs, and deploys projects.",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://js.puter.com/v2/"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
